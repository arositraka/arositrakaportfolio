<!-- ==================== SECTION CONTACT ====================-->
<section id="contact" class="contact">
    <div class="container">
        <h2 class="section-title">Me Contacter</h2>
        <p class="section-subtitle">
            Vous avez un projet intéressant ou une question ? N'hésitez pas à me contacter !
        </p>

        <div class="contact-content">
            <!-- Informations de contact -->
            <div class="contact-info">
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Email</h3>
                        <a href="mailto:tonemail@gmail.com">herysitrakaaroninony@gmail.com</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Téléphone</h3>
                        <a href="tel:+33612345678">+261 388174983</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Localisation</h3>
                        <p>Fianarantsoa, Madagascar</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="contact-details">
                        <h3>Disponibilité</h3>
                        <p>Lun - Ven, 9h - 18h</p>
                    </div>
                </div>
            </div>

            <!-- ✅ FORMULAIRE FORMSPREE (BASIC HTML) -->
            <form class="contact-form" action="https://formspree.io/f/mdaydpwe" method="POST">
                
                <div class="form-group">
                    <input 
                        type="text" 
                        name="nom"
                        placeholder="Votre nom" 
                        required 
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="email" 
                        name="email"
                        placeholder="Votre email" 
                        required 
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="text" 
                        name="sujet"
                        placeholder="Sujet" 
                        required 
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <textarea 
                        name="message"
                        placeholder="Votre message..." 
                        rows="5" 
                        required 
                        class="form-input"
                    ></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Envoyer le Message <i class="fas fa-paper-plane"></i>
                </button>

            </form>

        </div>
    </div>
</section>
